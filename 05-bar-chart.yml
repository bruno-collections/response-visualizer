info:
  name: 05-bar-chart
  type: http
  seq: 5

http:
  method: POST
  url: https://echo.usebruno.com
  body:
    type: json
    data: |-
      {
        "title": "API Usage Analytics",
        "methods": {
          "GET": 980,
          "POST": 420,
          "PUT": 210,
          "PATCH": 140,
          "DELETE": 160
        },
        "status": {
          "200": 1500,
          "201": 300,
          "400": 120,
          "500": 80
        }
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.body;

        bru.visualize('html', {
          name: 'Bar Chart',
          content: `
            <div style="padding:20px; font-family: Arial;">
              <h2> API Status Code Distribution</h2>
              <canvas id="barChart" width="500" height="400"></canvas>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script>
              const ctx = document.getElementById('barChart').getContext('2d');

              new Chart(ctx, {
                type: 'bar',
                data: {
                  labels: ${JSON.stringify(Object.keys(data.status))},
                  datasets: [{
                    label: 'Requests',
                    data: ${JSON.stringify(Object.values(data.status))},
                    backgroundColor: '#3b82f6'
                  }]
                },
                options: {
                  scales: {
                    y: {
                      beginAtZero: true
                    }
                  }
                }
              });
            </script>
          `
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
