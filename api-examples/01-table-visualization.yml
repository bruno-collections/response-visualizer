runtime:
  scripts:
    - type: after-response
      code: |-
        // Table Visualization

        const users = res.body;

        const rowData = users.map(user => ({
          id: user.id,
          name: user.user,
          email: user.email,
          status: user.status,
        }));

        const columnDefinitions = [
          { field: "id", filter: true },
          { field: "name", filter: true },
          { field: "email", filter: true },
          { field: "status", filter: false },
        ];

        bru.visualize('table', {
          name: 'usersTable',
          provider: 'ag-grid',
          props: { rowData, columnDefinitions }
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
